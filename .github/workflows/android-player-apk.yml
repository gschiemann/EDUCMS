name: Android Player APK

# Builds the kiosk APK on every push that touches apps/player or this
# workflow. Uploads as a downloadable artifact named 'edu-cms-player-apk'
# so non-developers can grab a fresh build straight from the GitHub UI:
# Actions → latest run → Artifacts → download.
#
# Manual trigger via workflow_dispatch lets you build whenever without
# pushing.

on:
  # IMPORTANT: do NOT mix `paths:` with `tags:` under a single push key.
  # GitHub treats the paths filter as applying to EVERY push including
  # tag pushes; tags don't have a branch diff so the paths check blocks
  # the tag event silently. Remove paths so tag pushes always build.
  # With the gradle cache + sdk cache the cost of extra runs is minimal.
  push:
    branches: [master, main]
    tags:
      - 'player-v*'
  workflow_dispatch:
    inputs:
      playerBaseUrl:
        description: 'Override the player base URL (e.g. for a staging build)'
        required: false
        default: ''

permissions:
  contents: write   # softprops/action-gh-release needs write to create Releases

concurrency:
  group: android-player-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/player/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/player/**/*.gradle*', 'apps/player/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Gradle (bootstrap — wrapper jar isn't committed)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f apps/player/gradle/wrapper/gradle-wrapper.jar ] || [ ! -f apps/player/gradlew ]; then
            echo "Bootstrapping Gradle wrapper for the player project…"
            # Subshell so 'cd' doesn't leak into the next chmod, which would
            # then resolve apps/player/gradlew relative to the new CWD.
            ( cd apps/player && gradle wrapper --gradle-version 8.7 )
          fi
          ls -la apps/player/gradlew apps/player/gradle/wrapper/gradle-wrapper.jar
          chmod +x apps/player/gradlew

      - name: Build debug APK
        env:
          PLAYER_BASE_URL: ${{ github.event.inputs.playerBaseUrl != '' && github.event.inputs.playerBaseUrl || 'https://educms-five.vercel.app/player' }}
        run: |
          cd apps/player
          # Tee full build output so failures leave a readable artifact for
          # debugging without needing `gh auth` just to read CI logs.
          set -o pipefail
          ./gradlew --no-daemon --stacktrace assembleDebug -PplayerBaseUrl="$PLAYER_BASE_URL" 2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          exit $status

      - name: Dump gradle log tail on failure
        if: failure()
        run: |
          echo "### Gradle build failed — last 200 lines of output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 apps/player/gradle-build.log >> $GITHUB_STEP_SUMMARY || echo "(no gradle-build.log produced)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # ALSO push errors as workflow-command annotations so the
          # public check-runs API surfaces them — that way `curl` can
          # read the Kotlin compile error without a GitHub token.
          # Grep anything that looks like a compile error; keep a cap
          # so a runaway stack trace doesn't flood the annotations.
          if [ -f apps/player/gradle-build.log ]; then
            grep -E '^(e:|error:|FAILURE:|\* What went wrong:|\* Where:|\s+at .*\.kt:|Execution failed|> Task .+ FAILED|Compilation error|> [A-Z])' apps/player/gradle-build.log | head -n 80 | while IFS= read -r L; do
              # Strip anything that looks like a percent-encoded char
              # and escape `%` for ::error::
              clean=$(echo "$L" | sed 's/%/%25/g; s/\r/%0D/g')
              echo "::error::GRADLE: $clean"
            done
          fi

      - name: Upload gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: apps/player/gradle-build.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Locate + version-rename APK
        id: locate
        run: |
          APK=$(find apps/player/app/build/outputs/apk/debug -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK was produced"
            exit 1
          fi
          # Extract versionName from build.gradle.kts so operators can
          # tell at a glance which build they downloaded — bare
          # "app-debug.apk" told them nothing. If a tag triggered this
          # run, use the tag instead so the filename matches the
          # GitHub Release tag.
          VN=$(grep -oP 'versionName\s*=\s*"\K[^"]+' apps/player/app/build.gradle.kts | head -1)
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == player-v* ]]; then
            VERSION="${TAG#player-v}"
          elif [ -n "$VN" ]; then
            VERSION="$VN-${GITHUB_SHA:0:7}"
          else
            VERSION="${GITHUB_SHA:0:7}"
          fi
          NEW_NAME="edu-cms-player-v${VERSION}.apk"
          NEW_PATH="apps/player/app/build/outputs/apk/debug/${NEW_NAME}"
          mv "$APK" "$NEW_PATH"
          echo "apk=$NEW_PATH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          ls -la "$NEW_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: edu-cms-player-apk
          path: ${{ steps.locate.outputs.apk }}
          retention-days: 30
          if-no-files-found: error

      # On tag push (player-v*) attach the APK to a GitHub Release so
      # /api/v1/player/apk/latest can resolve it without any Railway env
      # config. The controller auto-picks arm64-v8a first, falls back to
      # universal, then armeabi-v7a — so naming here just needs to match.
      - name: Attach APK to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/player-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.apk }}
          tag_name: ${{ github.ref_name }}
          name: Player ${{ github.ref_name }}
          body: |
            EduCMS Player kiosk APK.

            Sideload onto any Android 7+ device or Nova Taurus controller.
            See `docs/PLAYER_APK_NOVA_TAURUS.md` for the ViPlex Express
            walkthrough.

            Dashboard hotlink: `/api/v1/player/apk/latest` resolves to
            this asset automatically.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "### EduCMS Player APK built ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above (\`edu-cms-player-apk\`)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Player base URL:** \`${PLAYER_BASE_URL:-https://educms-five.vercel.app/player}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Side-load on Android: Settings → Apps → Special access → Install unknown apps → enable for your file manager → tap the .apk." >> $GITHUB_STEP_SUMMARY
        env:
          PLAYER_BASE_URL: ${{ github.event.inputs.playerBaseUrl != '' && github.event.inputs.playerBaseUrl || 'https://educms-five.vercel.app/player' }}
