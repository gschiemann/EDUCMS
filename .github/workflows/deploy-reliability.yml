name: Deploy Reliability

# Runs on every push to master + every PR. Blocks the bad-build classes
# we hit in production debugging on 2026-04-19:
#   - native deps not compiling on Alpine (argon2/bcrypt)
#   - Prisma schema missing at install time
#   - workspace TS packages not built before Node tries to require them
#   - lockfile drift
#   - TS errors in apps/web that break the Vercel build
# See CLAUDE.md "Build failure modes" appendix for the full story.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs when a newer commit arrives on the same ref.
concurrency:
  group: deploy-reliability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-check:
    name: pnpm lockfile drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Verify lockfile matches package.json
        run: pnpm install --frozen-lockfile --lockfile-only

  api-build:
    name: API + workspace packages build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate Prisma client (must run BEFORE workspace builds — auth-core imports @prisma/client transitively)
        run: cd packages/database && npx prisma generate
      - name: Build workspace packages
        run: |
          pnpm --filter @cms/api-types build
          pnpm --filter @cms/auth-core build
          pnpm --filter @cms/ws-events build
      - name: Build API
        run: pnpm --filter api build

  web-build:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate
      - name: Build web
        env:
          NEXT_PUBLIC_API_URL: https://api-production-39a1.up.railway.app/api/v1
        run: pnpm --filter web build

  docker-build:
    name: Docker build + boot smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Build the same image Railway will build
        run: docker build -f Dockerfile -t educms-api:ci .
      - name: Boot smoke test
        run: |
          # NOTE: no --rm so we can still read logs after the container
          # exits. We auto-delete in the cleanup step below.
          docker run -d --name api-smoke -p 18080:8080 \
            -e NODE_ENV=production \
            -e PORT=8080 \
            -e DATABASE_URL='postgres://fake:fake@127.0.0.1:5432/fake?schema=public' \
            -e DIRECT_URL='postgres://fake:fake@127.0.0.1:5432/fake?schema=public' \
            -e JWT_SECRET='ci-fake-jwt-secret-please-do-not-use-in-prod-32chars' \
            -e SESSION_SECRET='ci-fake-session-secret-please-do-not-use-in-prod-32chars' \
            -e DEVICE_SECRET_KEY='ci-fake-device-secret-please-do-not-use-in-prod-32chars' \
            -e DEVICE_JWT_SECRET='ci-fake-device-jwt-secret-please-do-not-use-in-prod-32chars' \
            -e SUPABASE_URL='https://fake.supabase.co' \
            -e SUPABASE_SERVICE_ROLE_KEY='fake' \
            educms-api:ci
          # Poll up to 60s for "API listening" or container exit.
          for i in $(seq 1 30); do
            STATE=$(docker inspect -f '{{.State.Status}}' api-smoke 2>/dev/null || echo "missing")
            if docker logs api-smoke 2>&1 | grep -q "API listening"; then
              echo "API booted ✓"
              exit_ok=1
              break
            fi
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              EXIT_CODE=$(docker inspect -f '{{.State.ExitCode}}' api-smoke 2>/dev/null || echo "?")
              echo "✗ Container exited (state=$STATE, exit code=$EXIT_CODE)"
              echo "::group::Last 200 lines of container logs"
              docker logs --tail 200 api-smoke 2>&1 || true
              echo "::endgroup::"
              exit 1
            fi
            sleep 2
          done
          if [ "${exit_ok:-0}" != "1" ]; then
            echo "✗ API never logged 'API listening' within 60s"
            echo "Container state: $(docker inspect -f '{{.State.Status}}' api-smoke 2>/dev/null || echo missing)"
            echo "::group::Last 200 lines of container logs"
            docker logs --tail 200 api-smoke 2>&1 || true
            echo "::endgroup::"
            exit 1
          fi
      - name: Healthcheck curl
        run: |
          curl -fsS --max-time 10 http://localhost:18080/api/v1/health || {
            echo "✗ Healthcheck failed"
            echo "::group::Container logs"
            docker logs --tail 200 api-smoke 2>&1 || true
            echo "::endgroup::"
            exit 1
          }
          echo "Healthcheck OK ✓"
      - name: Cleanup container
        if: always()
        run: |
          docker stop api-smoke 2>/dev/null || true
          docker rm api-smoke 2>/dev/null || true
