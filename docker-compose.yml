version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DATABASE_URL=postgres://cms_user:cms_password@db:5432/school_cms
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_only_jwt_secret_CHANGE_ME
      - SESSION_SECRET=dev_only_session_secret_CHANGE_ME
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount API source for hot reloading
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: ["node", "apps/api/dist/main.js"]

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cms_user
      - POSTGRES_PASSWORD=cms_password
      - POSTGRES_DB=school_cms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d school_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
